site_name: Math Library
repo_url: https://github.com/yeahBOYYYYY/math-library/
repo_name: yeahBOYYYYY/math-library
site_description: A documentation site for my project.
site_author: Ron Mikhelman
site_url: https://yeahBOYYYYY.github.io/math-library/
copyright: Copyright &copy; 2024 - 2026 Ron Mikhelman

markdown_extensions:
  - toc:
      permalink: "🔗"
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.blocks.caption

theme:
  name: material
  language: en
  favicon: assets/favicon.ico
  logo: assets/favicon.ico

  icon:
    repo: fontawesome/brands/github
  
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-3
        name: Switch to system preference

  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.prune
    - navigation.indexes
    # - navigation.instant
    - toc.follow
    # - toc.integrate
    - navigation.top
    - search.suggest
    - search.share
    - header.autohide

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: he
          name: Hebrew
          build: true
          site_name: ספריית מתמטיקה
          nav_translations:
            Home: דף הבית
            Mathematics Bachelor: תואר ראשון במתמטיקה
            Discrete Mathematics: מתמטיקה בדידה
            Introduction to Logic: מבוא ללוגיקה
            Introduction to Set Theory: מבוא לתורת הקבוצות
            Introduction to Combinatorics: מבוא לקומבינטוריקה
            Introduction to Graph Theory: מבוא לתורת הגרפים
            Analysis: אנליזה
            Real Analysis 1: חדו"א 1
            Real Analysis 2: חדו"א 2
            Computer Science Bachelor: תואר ראשון במדעי המחשב
            Algorithms: אלגוריתמים
            Data Structures: מבני נתונים
  - git-authors
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
  - glightbox:
      auto_themed: true
      auto_caption: true
      caption_position: bottom

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeahBOYYYYY
      name: GitHub

extra_javascript:
  # - javascripts/mathjax.js
  # - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - stylesheets/admonitions.css
  - https://unpkg.com/katex@0/dist/katex.min.css

nav:
  - Home: index.md
  - Mathematics Bachelor:
    - mathematics_bachelor/index.md
    - Discrete Mathematics:
      - Introduction to Logic: mathematics_bachelor/discrete_mathematics/introduction_to_logic.md
      - Introduction to Set Theory: mathematics_bachelor/discrete_mathematics/introduction_to_set_theory.md
      - Introduction to Combinatorics: mathematics_bachelor/discrete_mathematics/introduction_to_combinatorics.md
      - Introduction to Graph Theory: mathematics_bachelor/discrete_mathematics/introduction_to_graph_theory.md
    - Analysis:
      - Real Analysis 1: mathematics_bachelor/analysis/real_analysis_1.md
      - Real Analysis 2: mathematics_bachelor/analysis/real_analysis_2.md
  - Computer Science Bachelor:
    - computer_science_bachelor/index.md
    - Algorithms:
      - Algorithms: computer_science_bachelor/algorithms/algorithms.md
      - Data Structures: computer_science_bachelor/algorithms/data_structures.md
